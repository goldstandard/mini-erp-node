<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remove Raw Material Prices</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .page-wrap { max-width: 1280px; margin: 0 auto; padding: 20px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
    .filters { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; background: #f5f7fb; border: 1px solid #dbe3f0; border-radius: 8px; padding: 10px 12px; }
    .filters label { font-weight: 600; }
    .filters select, .filters input { padding: 6px 8px; border: 1px solid #cfd8e3; border-radius: 6px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { border: none; border-radius: 6px; padding: 8px 12px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #1f5fbf; color: #fff; }
    .btn-danger { background: #b71c1c; color: #fff; }
    .btn-secondary { background: #e9eef8; color: #1d355d; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .status { margin: 10px 0 12px; min-height: 20px; font-weight: 600; }
    .status.error { color: #b71c1c; }
    .status.ok { color: #1b5e20; }
    .small-note { font-size: 0.9em; color: #555; margin-bottom: 8px; }
    .table-wrap { overflow: auto; border: 1px solid #dbe3f0; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th, td { border-bottom: 1px solid #ecf0f6; padding: 10px; text-align: left; }
    th { position: sticky; top: 0; background: #fce4e4; color: #6b1010; z-index: 1; font-weight: 700; }
    .row-actions { display: flex; gap: 8px; }
    .row-actions .btn { padding: 6px 9px; }
  </style>
</head>
<body>
  <div class="container">
    <header class="app-header">
      <div class="app-branding">
        <img src="/data/PFN_logo.png" alt="PFN" class="company-logo" />
        <div class="app-title-wrap">
          <h1>Remove Raw Material Prices</h1>
          <p>Delete exact monthly prices by plant, period and category</p>
        </div>
      </div>
      <div class="app-top-actions">
        <button class="action-btn btn-nav" onclick="window.location.href='/rm-prices'">Back to RM Prices</button>
        <button id="changePasswordBtn" class="action-btn btn-password" style="display:none;">Change Password</button>
        <button id="adminBtn" class="action-btn btn-admin" style="display:none;">Admin</button>
        <button class="action-btn btn-logout" onclick="auth.logout()">Logout</button>
      </div>
    </header>

    <div class="page-wrap">
      <div class="top-bar">
        <div class="filters">
          <label for="yearInput">Year</label>
          <input id="yearInput" type="number" min="2000" max="2100" />

          <label for="monthInput">Month</label>
          <input id="monthInput" type="number" min="1" max="12" />

          <label for="plantSelect">Plant</label>
          <select id="plantSelect">
            <option value="CZ">CZ</option>
            <option value="EG">EG</option>
            <option value="ZA">ZA</option>
          </select>

          <label for="categoryFilter">Category</label>
          <select id="categoryFilter">
            <option value="">All</option>
            <option value="list_sb">SB polymer</option>
            <option value="list_mb">MB polymer</option>
            <option value="list_pigment">Pigment</option>
            <option value="list_additive">Additive</option>
            <option value="list_surfactant">Surfactant</option>
          </select>

          <button class="btn btn-primary" onclick="loadPrices()">Load Prices</button>
        </div>

        <div class="actions">
          <button id="deleteSelectedBtn" class="btn btn-danger" onclick="deleteSelected()" disabled>Delete Selected</button>
          <button id="deleteFilteredBtn" class="btn btn-danger" onclick="deleteFiltered()" disabled>Delete All Filtered</button>
        </div>
      </div>

      <div id="status" class="status"></div>
      <div id="summary" class="small-note"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width: 42px;"><input id="selectAll" type="checkbox" onchange="toggleSelectAll(this.checked)" /></th>
              <th>Category</th>
              <th>Material</th>
              <th>Price</th>
              <th>Currency</th>
              <th>Source</th>
              <th>Updated</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="rowsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/auth.js"></script>
  <script>
    let rows = [];
    const selectedIds = new Set();

    function setStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.textContent = msg || '';
      el.className = `status ${type}`.trim();
    }

    function categoryLabel(listKey) {
      const map = {
        list_sb: 'SB polymer',
        list_mb: 'MB polymer',
        list_pigment: 'Pigment',
        list_additive: 'Additive',
        list_surfactant: 'Surfactant'
      };
      return map[listKey] || listKey;
    }

    function formatPrice(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n.toFixed(2) : 'N/A';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text ?? '');
      return div.innerHTML;
    }

    function currentPeriodDefaults() {
      const now = new Date();
      document.getElementById('yearInput').value = now.getFullYear();
      document.getElementById('monthInput').value = now.getMonth() + 1;
    }

    function updateActionButtons() {
      document.getElementById('deleteSelectedBtn').disabled = selectedIds.size === 0;
      document.getElementById('deleteFilteredBtn').disabled = rows.length === 0;
    }

    function toggleSelectAll(checked) {
      selectedIds.clear();
      if (checked) {
        rows.forEach((row) => selectedIds.add(Number(row.id)));
      }
      renderRows();
    }

    function toggleRowSelection(id, checked) {
      const numericId = Number(id);
      if (checked) selectedIds.add(numericId);
      else selectedIds.delete(numericId);
      renderRows();
    }

    function renderRows() {
      const tbody = document.getElementById('rowsBody');
      tbody.innerHTML = '';

      rows.forEach((row) => {
        const tr = document.createElement('tr');
        const id = Number(row.id);
        const checked = selectedIds.has(id) ? 'checked' : '';
        const updated = row.updated_at ? new Date(row.updated_at).toLocaleString() : 'N/A';

        tr.innerHTML = `
          <td><input type="checkbox" ${checked} onchange="toggleRowSelection(${id}, this.checked)" /></td>
          <td>${escapeHtml(categoryLabel(row.material_list_key))}</td>
          <td>${escapeHtml(row.material_name)}</td>
          <td>${escapeHtml(formatPrice(row.price))}</td>
          <td>${escapeHtml(row.currency || '')}</td>
          <td>${escapeHtml(row.price_source || '')}</td>
          <td>${escapeHtml(updated)}</td>
          <td>
            <div class="row-actions">
              <button class="btn btn-danger" onclick="deleteSingle(${id})">Delete</button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById('summary').textContent = `Loaded prices: ${rows.length} | Selected: ${selectedIds.size}`;
      document.getElementById('selectAll').checked = rows.length > 0 && selectedIds.size === rows.length;
      updateActionButtons();
    }

    async function loadPrices() {
      setStatus('Loading prices...', '');
      rows = [];
      selectedIds.clear();
      renderRows();

      const year = Number(document.getElementById('yearInput').value);
      const month = Number(document.getElementById('monthInput').value);
      const plant = document.getElementById('plantSelect').value;
      const materialListKey = document.getElementById('categoryFilter').value;

      const params = new URLSearchParams({ year: String(year), month: String(month), plant });
      if (materialListKey) params.set('material_list_key', materialListKey);

      try {
        const response = await fetch(`/api/rm-prices/remove/list?${params.toString()}`, {
          headers: { Authorization: `Bearer ${auth.getToken()}` }
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || 'Failed to load prices');

        rows = Array.isArray(data.rows) ? data.rows : [];
        renderRows();
        setStatus('Loaded.', 'ok');
      } catch (err) {
        setStatus(`Error: ${err.message}`, 'error');
      }
    }

    async function deleteSingle(id) {
      if (!confirm('Delete this price record?')) return;
      await deleteByIds([Number(id)]);
    }

    async function deleteSelected() {
      const ids = Array.from(selectedIds.values());
      if (!ids.length) return;
      if (!confirm(`Delete ${ids.length} selected price record(s)?`)) return;
      await deleteByIds(ids);
    }

    async function deleteFiltered() {
      if (!rows.length) return;
      if (!confirm(`Delete ALL ${rows.length} loaded record(s) for this filter?`)) return;

      const payload = {
        year: Number(document.getElementById('yearInput').value),
        month: Number(document.getElementById('monthInput').value),
        plant: document.getElementById('plantSelect').value,
        material_list_key: document.getElementById('categoryFilter').value || null
      };

      setStatus('Deleting filtered records...', '');
      try {
        const response = await fetch('/api/rm-prices/remove', {
          method: 'DELETE',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${auth.getToken()}`
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || 'Delete failed');

        setStatus(`Deleted records: ${Number(data?.result?.deleted || 0)}`, 'ok');
        await loadPrices();
      } catch (err) {
        setStatus(`Error: ${err.message}`, 'error');
      }
    }

    async function deleteByIds(ids) {
      setStatus('Deleting selected records...', '');
      try {
        const response = await fetch('/api/rm-prices/remove', {
          method: 'DELETE',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${auth.getToken()}`
          },
          body: JSON.stringify({ ids })
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || 'Delete failed');

        setStatus(`Deleted records: ${Number(data?.result?.deleted || 0)}`, 'ok');
        await loadPrices();
      } catch (err) {
        setStatus(`Error: ${err.message}`, 'error');
      }
    }

    async function ensureRmModifyAccess() {
      const token = auth.getToken();
      const [meResp, accessResp] = await Promise.all([
        fetch('/api/auth/me', { headers: { Authorization: `Bearer ${token}` } }),
        fetch('/api/auth/me/access-permissions', { headers: { Authorization: `Bearer ${token}` } })
      ]);

      const me = meResp.ok ? await meResp.json() : null;
      if (me && me.role === 'admin') {
        return true;
      }

      const access = accessResp.ok ? await accessResp.json() : {};
      const canModify = !!(access && access.pages && access.pages['rm-prices'] && access.pages['rm-prices'].modify);
      return canModify;
    }

    document.addEventListener('DOMContentLoaded', async () => {
      if (!auth.isAuthenticated()) {
        window.location.href = '/login.html';
        return;
      }

      try {
        const allowed = await ensureRmModifyAccess();
        if (!allowed) {
          alert('You need RM Prices modify permission to access Remove Prices.');
          window.location.href = '/rm-prices';
          return;
        }
      } catch (_err) {
        alert('Failed to verify access permissions.');
        window.location.href = '/rm-prices';
        return;
      }

      await auth.configureHeaderButtons();
      currentPeriodDefaults();
      await loadPrices();
    });
  </script>
</body>
</html>
